name: Blueprint consistency

on:
  pull_request:
    paths:
      - 'blueprint/src/content.tex'
      - 'blueprint/lean_decls'
      - 'blueprint/check_blueprint.py'
      - '.github/workflows/blueprint-check.yml'
      - '.github/workflows/blueprint.yml'

permissions:
  contents: read

env:
  # Opt JS actions into the Node.js 24 runtime ahead of the 2026-06-02 default
  # switchover; mirrors `blueprint.yml`.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run blueprint consistency check
        run: |
          python3 blueprint/check_blueprint.py
