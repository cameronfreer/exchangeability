name: Deploy documentation

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

env:
  # Opt all JavaScript actions (including those pinned to older versions inside
  # `leanprover/lean-action` and `leanprover-community/docgen-action`) into the
  # Node.js 24 runtime ahead of the 2026-06-16 default switchover. Drop this
  # block once all transitively-used actions ship Node.js 24 builds.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Full history for doc generation

      - name: Install elan
        uses: leanprover/lean-action@main
        with:
          build: false

      - name: Get mathlib cache
        run: |
          lake exe cache get

      - name: Build Lean project
        run: |
          lake build

      - name: Check declarations
        run: |
          ~/.elan/bin/lake exe checkdecls blueprint/lean_decls

      - name: Check blueprint consistency
        run: |
          python3 blueprint/check_blueprint.py

      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf "/usr/local/share/boost"
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
          df -h

      - name: Build and deploy documentation
        uses: leanprover-community/docgen-action@main
        with:
          blueprint: true
          homepage: home_page
          references: docs/references.bib
